<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Achex 3D FPS - Multi Device</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; font-family: 'Helvetica Neue', Arial, sans-serif; }
        
        /* セレクター画面 */
        #ui-layer { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; background: rgba(255,255,255,0.9); z-index: 100; }
        #setup-box { text-align: center; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 320px; }
        .screen { display: none; }
        .active { display: block; }
        
        h2 { color: #333; margin-bottom: 20px; }
        input, select, button { display: block; width: 100%; margin: 12px 0; padding: 14px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        
        .device-btn { background: #007bff; color: white; font-weight: bold; border: none; cursor: pointer; margin-bottom: 10px; }
        .join-btn { background: #28a745; color: white; font-weight: bold; border: none; cursor: pointer; }

        /* ゲーム内UI */
        #playerCount { position: absolute; top: 20px; right: 20px; color: #333; font-size: 18px; font-weight: bold; background: rgba(255,255,255,0.7); padding: 5px 15px; border-radius: 20px; display: none; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(0,0,0,0.5); font-size: 24px; pointer-events: none; display: none; z-index: 10; }
        
        /* ジョイスティック用エリア */
        #joystick-container { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; z-index: 50; display: none; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="setup-box">
            <div id="screen-device" class="screen active">
                <h2>デバイスを選択</h2>
                <button class="device-btn" onclick="setDevice('pc')">PC (キーボード & マウス)</button>
                <button class="device-btn" onclick="setDevice('mobile')">モバイル (ジョイスティック)</button>
            </div>

            <div id="screen-profile" class="screen">
                <h2>プロフィール設定</h2>
                <input type="text" id="playerName" placeholder="名前を入力" maxlength="10">
                <select id="weaponSelect">
                    <option value="rifle">RIFLE (RED)</option>
                    <option value="shotgun">SHOTGUN (BLUE)</option>
                </select>
                <button class="join-btn" id="btnJoin">ゲーム開始</button>
            </div>
        </div>
    </div>

    <div id="playerCount">PLAYERS: 1</div>
    <div id="crosshair">＋</div>
    <div id="joystick-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const HUB_NAME = "Achex_MultiFPS_Stage_V3"; 
        const WS_URL = "wss://achex.ca:4001";
        
        let scene, camera, renderer, socket;
        let myId = Math.random().toString(36).substring(7);
        let players = {}; 
        let moveState = { w: false, s: false, a: false, d: false };
        let isGameStarted = false;
        let deviceType = 'pc';
        let myData = { name: "", weapon: "", pos: {x: 0, z: 20}, rot: 0 };
        
        // ジョイスティックデータ
        let joystickInput = { x: 0, y: 0 };
        let touchStartPos = { x: 0, y: 0 };

        // --- デバイス選択処理 ---
        window.setDevice = (type) => {
            deviceType = type;
            document.getElementById('screen-device').classList.remove('active');
            document.getElementById('screen-profile').classList.add('active');
        };

        // --- シーン構築 ---
        function setupScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // 明るい空色
            scene.fog = new THREE.Fog(0x87ceeb, 20, 100);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 明るい照明
            const ambient = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffffff, 1.0);
            sun.position.set(50, 100, 50);
            scene.add(sun);

            createMap();
            animate();
        }

        function createMap() {
            // 床
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(200, 200),
                new THREE.MeshStandardMaterial({ color: 0xeeeeee })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            const grid = new THREE.GridHelper(200, 40, 0xaaaaaa, 0xcccccc);
            scene.add(grid);

            // 障害物
            for(let i=0; i<20; i++) {
                const h = 2 + Math.random() * 5;
                const box = new THREE.Mesh(
                    new THREE.BoxGeometry(4, h, 4),
                    new THREE.MeshStandardMaterial({ color: 0xdddddd })
                );
                box.position.set(Math.random()*160-80, h/2, Math.random()*160-80);
                scene.add(box);
            }
        }

        // --- ジョイスティック初期化 ---
        function initMobileControls() {
            const manager = nipplejs.create({
                zone: document.getElementById('joystick-container'),
                mode: 'static',
                position: { left: '60px', bottom: '60px' },
                color: 'blue'
            });

            manager.on('move', (evt, data) => {
                joystickInput.x = data.vector.x;
                joystickInput.y = data.vector.y;
            });

            manager.on('end', () => {
                joystickInput.x = 0;
                joystickInput.y = 0;
            });

            // 右半分での視点操作
            window.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                if (touch.clientX > window.innerWidth / 2) {
                    touchStartPos.x = touch.clientX;
                    touchStartPos.y = touch.clientY;
                }
            });

            window.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                if (touch.clientX > window.innerWidth / 2) {
                    const dx = touch.clientX - touchStartPos.x;
                    camera.rotation.y -= dx * 0.005;
                    touchStartPos.x = touch.clientX;
                    touchStartPos.y = touch.clientY;
                }
            });
        }

        // --- ネットワーク ---
        function connectNetwork() {
            socket = new WebSocket(WS_URL);
            socket.onopen = () => socket.send(JSON.stringify({ auth: "public", join: HUB_NAME }));
            socket.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (!data.msg || data.sID === myId) return;
                if (data.msg.type === "move") updateRemotePlayer(data.sID, data.msg);
            };
        }

        function updateRemotePlayer(id, data) {
            if (!players[id]) {
                const mat = new THREE.MeshStandardMaterial({ color: data.weapon === "rifle" ? 0xff4444 : 0x4444ff });
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), mat);
                scene.add(mesh);
                players[id] = { mesh, lastUpdate: Date.now() };
            }
            players[id].mesh.position.set(data.pos.x, 1, data.pos.z);
            players[id].mesh.rotation.y = data.rot;
            players[id].lastUpdate = Date.now();
            document.getElementById('playerCount').innerText = `PLAYERS: ${Object.keys(players).length + 1}`;
        }

        // --- ループ ---
        function animate() {
            requestAnimationFrame(animate);

            if (isGameStarted) {
                const speed = 0.15;
                
                if (deviceType === 'pc') {
                    if (moveState.w) { camera.position.x -= Math.sin(camera.rotation.y) * speed; camera.position.z -= Math.cos(camera.rotation.y) * speed; }
                    if (moveState.s) { camera.position.x += Math.sin(camera.rotation.y) * speed; camera.position.z += Math.cos(camera.rotation.y) * speed; }
                    if (moveState.a) { camera.position.x -= Math.cos(camera.rotation.y) * speed; camera.position.z += Math.sin(camera.rotation.y) * speed; }
                    if (moveState.d) { camera.position.x += Math.cos(camera.rotation.y) * speed; camera.position.z -= Math.sin(camera.rotation.y) * speed; }
                } else {
                    // モバイル移動 (ジョイスティック)
                    camera.position.x += (joystickInput.x * Math.cos(camera.rotation.y) - joystickInput.y * Math.sin(camera.rotation.y)) * speed;
                    camera.position.z += (-joystickInput.x * Math.sin(camera.rotation.y) - joystickInput.y * Math.cos(camera.rotation.y)) * speed;
                }

                // 送信
                if (socket && socket.readyState === 1) {
                    socket.send(JSON.stringify({
                        to: HUB_NAME, sID: myId,
                        msg: { type: "move", pos: { x: camera.position.x, z: camera.position.z }, rot: camera.rotation.y, weapon: myData.weapon }
                    }));
                }
            }
            renderer.render(scene, camera);
        }

        // 開始ボタン
        document.getElementById('btnJoin').onclick = () => {
            myData.weapon = document.getElementById('weaponSelect').value;
            myData.name = document.getElementById('playerName').value || "User";
            
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('playerCount').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            
            if (deviceType === 'pc') {
                document.body.requestPointerLock();
            } else {
                document.getElementById('joystick-container').style.display = 'block';
                initMobileControls();
            }
            
            isGameStarted = true;
            connectNetwork();
        };

        window.addEventListener('keydown', (e) => { moveState[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { moveState[e.key.toLowerCase()] = false; });
        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) camera.rotation.y -= e.movementX * 0.002;
        });

        setupScene();
    </script>
</body>
</html>
