<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Achex 3D FPS - Fix Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui-layer { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); color: white; z-index: 100; }
        #lobby { text-align: center; background: #222; padding: 30px; border-radius: 15px; border: 1px solid #444; }
        input, select, button { display: block; width: 100%; margin: 10px 0; padding: 12px; border-radius: 5px; box-sizing: border-box; }
        button { background: #28a745; color: white; font-weight: bold; border: none; cursor: pointer; }
        #playerCount { position: absolute; top: 20px; right: 20px; color: #0f0; font-size: 20px; z-index: 10; display: none; font-family: monospace; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; pointer-events: none; display: none; z-index: 10; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="lobby">
            <h2>FPS ARENA</h2>
            <input type="text" id="playerName" placeholder="名前を入力" maxlength="10">
            <select id="weaponSelect">
                <option value="rifle">RIFLE (RED)</option>
                <option value="shotgun">SHOTGUN (BLUE)</option>
            </select>
            <button id="btnJoin">ゲーム開始</button>
        </div>
    </div>

    <div id="playerCount">PLAYERS: 1</div>
    <div id="crosshair">+</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const HUB_NAME = "Achex_FPS_Fix_999"; 
        const WS_URL = "wss://achex.ca:4001";
        
        let scene, camera, renderer, socket;
        let myId = Math.random().toString(36).substring(7);
        let players = {}; 
        let moveState = { w: false, s: false, a: false, d: false };
        let isGameStarted = false;
        let myData = { name: "", weapon: "", pos: {x: 0, z: 20}, rot: 0 };

        // --- 1. シーンの準備 (ページ読み込み時に即実行) ---
        function setupScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111); // 真っ黒を避ける
            scene.fog = new THREE.Fog(0x111111, 10, 80); // 霧の範囲を調整

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 20); // 最初は少し後ろから

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 明るいライトを追加
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            const directional = new THREE.DirectionalLight(0xffffff, 1.0);
            directional.position.set(10, 20, 10);
            scene.add(directional);

            // ステージ描画
            createMap();
            
            // 描画ループ開始
            animate();
        }

        function createMap() {
            // 床
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(100, 100),
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // グリッド
            const grid = new THREE.GridHelper(100, 40, 0x00ff00, 0x444444);
            scene.add(grid);

            // 障害物
            const boxGeo = new THREE.BoxGeometry(4, 4, 4);
            for(let i=0; i<10; i++) {
                const box = new THREE.Mesh(boxGeo, new THREE.MeshStandardMaterial({ color: 0x666666 }));
                box.position.set(Math.random()*60-30, 2, Math.random()*60-30);
                scene.add(box);
            }
        }

        // --- 2. ネットワーク ---
        function connectNetwork() {
            socket = new WebSocket(WS_URL);
            socket.onopen = () => {
                socket.send(JSON.stringify({ auth: "public", join: HUB_NAME }));
            };
            socket.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (!data.msg || data.sID === myId) return;
                if (data.msg.type === "move") updateRemotePlayer(data.sID, data.msg);
            };
        }

        function updateRemotePlayer(id, data) {
            if (!players[id]) {
                const mat = new THREE.MeshStandardMaterial({ color: data.weapon === "rifle" ? 0xff0000 : 0x00aaff });
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), mat);
                scene.add(mesh);
                players[id] = { mesh, lastUpdate: Date.now() };
                document.getElementById('playerCount').innerText = `PLAYERS: ${Object.keys(players).length + 1}`;
            }
            players[id].mesh.position.set(data.pos.x, 1, data.pos.z);
            players[id].mesh.rotation.y = data.rot;
            players[id].lastUpdate = Date.now();
        }

        // --- 3. アニメーションと入力 ---
        function animate() {
            requestAnimationFrame(animate);

            if (isGameStarted) {
                const speed = 0.15;
                if (moveState.w) { camera.position.x -= Math.sin(camera.rotation.y) * speed; camera.position.z -= Math.cos(camera.rotation.y) * speed; }
                if (moveState.s) { camera.position.x += Math.sin(camera.rotation.y) * speed; camera.position.z += Math.cos(camera.rotation.y) * speed; }
                if (moveState.a) { camera.position.x -= Math.cos(camera.rotation.y) * speed; camera.position.z += Math.sin(camera.rotation.y) * speed; }
                if (moveState.d) { camera.position.x += Math.cos(camera.rotation.y) * speed; camera.position.z -= Math.sin(camera.rotation.y) * speed; }

                if (socket && socket.readyState === 1) {
                    socket.send(JSON.stringify({
                        to: HUB_NAME, sID: myId,
                        msg: { type: "move", pos: { x: camera.position.x, z: camera.position.z }, rot: camera.rotation.y, weapon: myData.weapon }
                    }));
                }
            }
            renderer.render(scene, camera);
        }

        // 開始ボタン
        document.getElementById('btnJoin').onclick = () => {
            myData.weapon = document.getElementById('weaponSelect').value;
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('playerCount').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            document.body.requestPointerLock();
            isGameStarted = true;
            connectNetwork();
        };

        window.addEventListener('keydown', (e) => { moveState[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { moveState[e.key.toLowerCase()] = false; });
        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
            }
        });

        // ページ読み込み時にセットアップ
        setupScene();
    </script>
</body>
</html>
