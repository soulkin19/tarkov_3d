<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tank Online 3D: Fixed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        * { touch-action: none; -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        body { 
            margin: 0; overflow: hidden; background-color: #000; 
            font-family: 'Arial Black', sans-serif; 
            position: fixed; width: 100%; height: 100%; 
        }
        #setup, #ui, #team-indicator, #killLog, #mobile-controls { position: absolute; z-index: 10; }
        
        #setup { 
            inset: 0; background: rgba(0,0,0,0.92); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; padding: 20px; text-align: center; overflow-y: auto; z-index: 100;
        }
        .btn { padding: 14px 24px; margin: 8px; font-size: 15px; cursor: pointer; border-radius: 10px; border: none; font-weight: bold; transition: 0.2s; }
        .selected { border: 4px solid #f1c40f !important; box-shadow: 0 0 20px #f1c40f; }
        .opt-group { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .sys-btn { background: #2c3e50; color: white; width: 170px; text-align: left; }
        .sys-btn small { font-weight: normal; font-size: 11px; display: block; opacity: 0.85; }
        .label { font-size: 13px; color: #f1c40f; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }

        #ui { 
            top: 12px; left: 12px; background: rgba(255,255,255,0.9); 
            padding: 12px 16px; border-radius: 10px; border: 3px solid #333; 
            min-width: 190px; pointer-events: none; display: none;
        }
        .bar-bg { width: 100%; height: 8px; background: #ccc; margin-top: 6px; border-radius: 4px; overflow: hidden; }
        #gadget-bar { height: 100%; background: #8e44ad; transition: width 0.2s; }
        #defense-bar { height: 100%; background: #2980b9; transition: width 0.2s; }

        #team-indicator { 
            top: 12px; left: 50%; transform: translateX(-50%); 
            background: rgba(0,0,0,0.7); color: #f1c40f; padding: 6px 20px; 
            border-radius: 30px; font-size: 15px; border: 2px solid #f1c40f; display: none;
        }
        #killLog { top: 70px; right: 15px; color: #ff4d4d; font-size: 15px; text-shadow: 1px 1px 2px #000; text-align: right; font-weight: bold; pointer-events: none; }

        #mobile-controls { inset: 0; pointer-events: none; display: none; }
        #stick-area { position: absolute; bottom: 30px; left: 30px; width: 160px; height: 160px; background: rgba(255,255,255,0.15); border-radius: 50%; pointer-events: auto; border: 3px solid rgba(255,255,255,0.3); }
        #stick { position: absolute; top: 50%; left: 50%; width: 65px; height: 65px; background: rgba(255,255,255,0.7); border-radius: 50%; transform: translate(-50%, -50%); }
        .action-btn { position: absolute; width: 75px; height: 75px; background: rgba(0,0,0,0.6); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; pointer-events: auto; font-size: 13px; font-weight: bold; border: 3px solid #fff; }
        #btn-fire { bottom: 140px; right: 30px; width: 95px; height: 95px; background: rgba(192,57,43,0.85); font-size: 20px; }
        #btn-gadget { bottom: 40px; right: 150px; background: rgba(142,68,173,0.85); }
        #btn-def { bottom: 40px; right: 40px; background: rgba(41,128,185,0.85); }

        .ammo-selector { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 8px; pointer-events: auto; }
        .ammo-btn { width: 48px; height: 48px; background: rgba(0,0,0,0.7); color: #fff; border: 2px solid #f1c40f; border-radius: 8px; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

    <div id="setup">
        <h1 style="color:#f1c40f;">TANK ONLINE 3D</h1>
        <div class="label">戦車タイプ</div>
        <div class="opt-group">
            <button id="type-heavy" class="btn sys-btn">重戦車<small>HP:150 / 高火力</small></button>
            <button id="type-medium" class="btn sys-btn selected">中戦車<small>HP:100 / 標準</small></button>
            <button id="type-light" class="btn sys-btn">軽戦車<small>HP:60 / 高速</small></button>
        </div>
        <div class="label">セカンダリ [Q]</div>
        <div class="opt-group">
            <button id="def-1" class="btn sys-btn selected">AT4<small>ミサイル</small></button>
            <button id="def-6" class="btn sys-btn">ADS<small>防御システム</small></button>
            <button id="def-7" class="btn sys-btn">C4<small>設置・爆破</small></button>
        </div>
        <button id="start-game" class="btn" style="background:#f1c40f; color:#000; width:280px;">出撃開始</button>
    </div>

    <div id="team-indicator">TEAM: <span id="team-name">Free</span></div>
    <div id="ui">
        <div id="hpDisplay" style="font-size:18px; font-weight:bold;">HP: 100</div>
        <div id="weaponDisplay" style="font-size:14px; color:#e67e22;">HE</div>
        <div class="bar-bg"><div id="gadget-bar"></div></div>
        <div class="bar-bg"><div id="defense-bar"></div></div>
    </div>
    <div id="killLog"></div>
    <div id="mobile-controls">
        <div id="stick-area"><div id="stick"></div></div>
        <div id="btn-fire" class="action-btn">FIRE</div>
        <div id="btn-gadget" class="action-btn">修理(R)</div>
        <div id="btn-def" class="action-btn">武装(Q)</div>
        <div class="ammo-selector">
            <button class="ammo-btn" onclick="setAmmo('1')">HE</button>
            <button class="ammo-btn" onclick="setAmmo('2')">AP</button>
            <button class="ammo-btn" onclick="setAmmo('3')">FSDS</button>
        </div>
    </div>

    <script>
    (function() {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeddfb3);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 0.6);
        sun.position.set(200, 500, 100);
        scene.add(sun);

        const HUB_NAME = "tank_3d_pro_final";
        const player = {
            id: "P-" + Math.random().toString(36).substr(2, 5),
            type: 'medium', x: 100, y: 100, angle: 0, turretAngle: 0, vx: 0, vy: 0, hp: 100, maxHp: 100,
            reloading: 0, currentAmmo: '1', gadgetCD: 0, repairPool: 0, defense: 1, defenseCD: 0,
            mesh: null, turretMesh: null, team: "Free"
        };

        const stickData = { active: false, x: 0, y: 0 }; // 修正ポイント：これを追加
        const players = {}, shells = [], explosions = [], keys = {};
        let isMobileMode = false;

        const tankSpecs = {
            'heavy':  { hp: 150, speed: 0.3, power: 1.5, size: 1.2 },
            'medium': { hp: 100, speed: 0.5, power: 1.0, size: 1.0 },
            'light':  { hp: 60,  speed: 0.8, power: 0.6, size: 0.8 }
        };

        const ammoTypes = {
            '1': { name: "HE", power: 20, reload: 40, speed: 10, color: 0xe67e22 },
            '2': { name: "AP", power: 30, reload: 60, speed: 16, color: 0x34495e },
            '3': { name: "APFSDS", power: 45, reload: 100, speed: 30, color: 0x2c3e50 }
        };

        function createTankMesh(type) {
            const group = new THREE.Group();
            const s = tankSpecs[type].size;
            const body = new THREE.Mesh(new THREE.BoxGeometry(40*s, 15*s, 30*s), new THREE.MeshLambertMaterial({ color: 0x2d5a27 }));
            body.position.y = 7.5*s; group.add(body);
            const turretGroup = new THREE.Group(); turretGroup.position.y = 15*s;
            const head = new THREE.Mesh(new THREE.BoxGeometry(25*s, 10*s, 25*s), new THREE.MeshLambertMaterial({ color: 0x2d5a27 }));
            turretGroup.add(head);
            const barrel = new THREE.Mesh(new THREE.BoxGeometry(35*s, 5*s, 5*s), new THREE.MeshLambertMaterial({ color: 0x333333 }));
            barrel.position.x = 17.5*s; turretGroup.add(barrel);
            group.add(turretGroup);
            return { group, turret: turretGroup };
        }

        function fire() {
            if(player.reloading > 0) return;
            const a = ammoTypes[player.currentAmmo];
            const s = { 
                x: player.x + Math.cos(player.turretAngle)*40, y: player.y + Math.sin(player.turretAngle)*40,
                vx: Math.cos(player.turretAngle)*a.speed, vy: Math.sin(player.turretAngle)*a.speed,
                life: 200, color: a.color, mesh: new THREE.Mesh(new THREE.SphereGeometry(3), new THREE.MeshBasicMaterial({color: a.color}))
            };
            scene.add(s.mesh); shells.push(s);
            player.reloading = a.reload;
        }

        function repair() { if(player.gadgetCD <= 0) { player.repairPool = 40; player.gadgetCD = 600; } }

        window.setAmmo = (id) => { player.currentAmmo = id; };

        function update() {
            const spec = tankSpecs[player.type];
            
            if (isMobileMode && stickData.active) {
                // 戦車の向きを基準にした移動 (Up: 前進, Down: 後進, Left/Right: 旋回)
                const forward = -stickData.y; 
                const turn = stickData.x;
                player.angle += turn * 0.05;
                const moveSpeed = forward * spec.speed * 8;
                player.vx = Math.cos(player.angle) * moveSpeed;
                player.vy = Math.sin(player.angle) * moveSpeed;
                player.turretAngle = player.angle; // 砲塔を車体に合わせる
            } else {
                if(keys['ArrowUp']) { player.vx = Math.cos(player.angle)*spec.speed*6; player.vy = Math.sin(player.angle)*spec.speed*6; }
                else if(keys['ArrowDown']) { player.vx = -Math.cos(player.angle)*spec.speed*4; player.vy = -Math.sin(player.angle)*spec.speed*4; }
                else { player.vx *= 0.9; player.vy *= 0.9; }
                if(keys['ArrowLeft']) player.angle -= 0.04;
                if(keys['ArrowRight']) player.angle += 0.04;
                player.turretAngle = player.angle;
            }

            player.x += player.vx; player.y += player.vy;
            if(player.reloading > 0) player.reloading--;
            if(player.gadgetCD > 0) player.gadgetCD--;
            if(player.repairPool > 0) { player.hp = Math.min(player.maxHp, player.hp + 0.1); player.repairPool -= 0.1; }

            shells.forEach((s, i) => {
                s.x += s.vx; s.y += s.vy; s.life--;
                s.mesh.position.set(s.x, 15, s.y);
                if(s.life <= 0) { scene.remove(s.mesh); shells.splice(i, 1); }
            });

            if(player.mesh) {
                player.mesh.position.set(player.x, 0, player.y);
                player.mesh.rotation.y = -player.angle;
            }

            camera.position.set(player.x - Math.cos(player.angle)*300, 200, player.y - Math.sin(player.angle)*300);
            camera.lookAt(player.x, 20, player.y);

            document.getElementById('hpDisplay').innerText = `HP: ${Math.ceil(player.hp)}`;
            document.getElementById('weaponDisplay').innerText = ammoTypes[player.currentAmmo].name;
            document.getElementById('gadget-bar').style.width = (100 - (player.gadgetCD/600)*100) + "%";
        }

        // Joystick Events
        const stickEl = document.getElementById('stick'), stickArea = document.getElementById('stick-area');
        stickArea.addEventListener('touchstart', (e) => { stickData.active = true; });
        stickArea.addEventListener('touchmove', (e) => {
            if(!stickData.active) return; e.preventDefault();
            const touch = e.touches[0], rect = stickArea.getBoundingClientRect();
            const dx = touch.clientX - (rect.left + 80), dy = touch.clientY - (rect.top + 80);
            const dist = Math.min(60, Math.hypot(dx, dy)), ang = Math.atan2(dy, dx);
            stickData.x = (Math.cos(ang)*dist)/60; stickData.y = (Math.sin(ang)*dist)/60;
            stickEl.style.transform = `translate(calc(-50% + ${Math.cos(ang)*dist}px), calc(-50% + ${Math.sin(ang)*dist}px))`;
        });
        stickArea.addEventListener('touchend', () => { 
            stickData.active = false; stickData.x = 0; stickData.y = 0; 
            stickEl.style.transform = `translate(-50%, -50%)`; 
        });

        document.getElementById('btn-fire').onclick = fire;
        document.getElementById('btn-gadget').onclick = repair;
        window.onkeydown = (e) => { keys[e.key] = true; if(e.key === ' ') fire(); if(e.key === 'r') repair(); };
        window.onkeyup = (e) => keys[e.key] = false;

        document.getElementById('start-game').onclick = () => {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            if('ontouchstart' in window) { isMobileMode = true; document.getElementById('mobile-controls').style.display = 'block'; }
            const res = createTankMesh(player.type);
            player.mesh = res.group; player.turretMesh = res.turret;
            scene.add(player.mesh);
            animate();
        };

        function animate() { update(); renderer.render(scene, camera); requestAnimationFrame(animate); }
    })();
    </script>
</body>
</html>
